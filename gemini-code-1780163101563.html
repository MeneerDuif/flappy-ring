<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Ring: Extended Edition</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #FFFFFF;
            --primary: #FFD700;
            --ui-bg: rgba(0, 0, 0, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: var(--text-color);
        }

        #game-wrapper {
            position: relative;
            width: 400px;
            height: 600px;
            max-width: 100vw;
            max-height: 100vh;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            background-color: var(--bg-color);
            overflow: hidden;
        }

        /* Screen shake animation for game over */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .shake {
            animation: shake 0.4s;
            animation-iteration-count: 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--ui-bg);
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 2rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--primary);
            margin-bottom: 10px;
            text-align: center;
        }

        p {
            font-size: 1rem;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.5;
        }

        .score-display {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary);
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            z-index: 5;
            pointer-events: none;
        }

        .controls-hint {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 20px;
        }

        .btn {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 10px 20px;
            font-size: 1.2rem;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            margin-bottom: 15px;
        }

        .btn:hover {
            background: var(--primary);
            color: var(--bg-color);
        }

        .theme-selector, .toggles {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .theme-btn, .toggle-btn {
            background: transparent;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            padding: 5px 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
        }
        
        .theme-btn.active, .toggle-btn.active {
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 5px var(--primary);
        }

        /* Scanline effect for high contrast vibe */
        #game-wrapper::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 20;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="scoreDisplay" class="score-display">0</div>
    
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    
    <div id="startScreen" class="ui-layer">
        <h1>Flappy Ring</h1>
        <p>Cast it into the fire!<br>Destroy it!</p>
        <button class="btn" onclick="startGame()">Start Journey</button>
        <p class="controls-hint">Press UP ARROW, SPACE, or TAP to jump</p>
        
        <div class="theme-selector">
            <button class="theme-btn active" onclick="setTheme('highContrast', this)">High Contrast</button>
            <button class="theme-btn" onclick="setTheme('mordor', this)">Mordor</button>
            <button class="theme-btn" onclick="setTheme('shire', this)">The Shire</button>
        </div>
        <div class="toggles">
            <button class="toggle-btn active" id="soundToggle" onclick="toggleSound()">Sound: ON</button>
        </div>
    </div>

    <div id="gameOverScreen" class="ui-layer hidden">
        <h1>The Ring is Lost</h1>
        <p>Score: <span id="finalScore">0</span><br>High Score: <span id="highScore">0</span></p>
        <button class="btn" onclick="startGame()">Try Again</button>
        <p class="controls-hint">Press UP ARROW to restart</p>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const finalScoreEl = document.getElementById('finalScore');
    const highScoreEl = document.getElementById('highScore');
    const gameWrapper = document.getElementById('game-wrapper');
    const soundToggle = document.getElementById('soundToggle');

    // Themes (Expanded with colors for enemies and powerups)
    const themes = {
        highContrast: {
            bg: '#000000', ring: '#FFD700', ringGlow: '#FFFFFF',
            pipe: '#FFFFFF', pipeOutline: '#000000', mountain: '#333333',
            eye: '#FF0000', enemy: '#FF0000', powerup: '#00FF00', shield: '#00FFFF'
        },
        mordor: {
            bg: '#2A0800', ring: '#FFB300', ringGlow: '#FF4500',
            pipe: '#0D0D0D', pipeOutline: '#FF4500', mountain: '#1A0500',
            eye: '#FFEB3B', enemy: '#000000', powerup: '#00FF00', shield: '#4169E1'
        },
        shire: {
            bg: '#87CEEB', ring: '#FFD700', ringGlow: '#FFA500',
            pipe: '#228B22', pipeOutline: '#006400', mountain: '#90EE90',
            eye: '#FFFFFF', enemy: '#333333', powerup: '#32CD32', shield: '#ADD8E6'
        }
    };
    
    let currentTheme = themes.highContrast;

    // Game State
    let frames = 0;
    let score = 0;
    let highScore = localStorage.getItem('flappyRingHighScore') || 0;
    let currentState = 'START';
    let animationId;
    let milestoneMessage = "";
    let milestoneTimer = 0;

    // Audio System
    let audioCtx;
    let soundEnabled = true;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function toggleSound() {
        soundEnabled = !soundEnabled;
        soundToggle.innerText = `Sound: ${soundEnabled ? 'ON' : 'OFF'}`;
        soundToggle.classList.toggle('active', soundEnabled);
    }

    function playTone(freq, type, duration, vol = 0.1) {
        if (!soundEnabled || !audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    const sfx = {
        flap: () => { playTone(300, 'sine', 0.1); },
        score: () => { playTone(800, 'square', 0.1); setTimeout(() => playTone(1200, 'square', 0.15), 100); },
        crash: () => { playTone(100, 'sawtooth', 0.5, 0.2); setTimeout(() => playTone(50, 'square', 0.5, 0.2), 100); },
        powerup: () => { playTone(400, 'sine', 0.1); setTimeout(() => playTone(600, 'sine', 0.1), 100); setTimeout(() => playTone(800, 'sine', 0.2), 200); },
        shieldBreak: () => { playTone(800, 'sawtooth', 0.2); playTone(200, 'sine', 0.3); }
    };

    // Entities
    const ring = {
        x: 100, y: 300, radius: 12, velocity: 0, gravity: 0.25, jump: -6, rotation: 0,
        hasShield: false,
        
        draw: function() {
            ctx.save();
            ctx.translate(this.x, this.y);
            this.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (this.velocity * 0.1)));
            ctx.rotate(this.rotation);
            
            // Shield Effect
            if (this.hasShield) {
                ctx.beginPath();
                ctx.arc(0, 0, this.radius + 8, 0, Math.PI * 2);
                ctx.lineWidth = 2;
                ctx.strokeStyle = currentTheme.shield;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.shadowBlur = 15;
                ctx.shadowColor = currentTheme.shield;
            } else {
                ctx.shadowBlur = 10;
                ctx.shadowColor = currentTheme.ringGlow;
            }
            
            // The Ring
            ctx.beginPath();
            ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
            ctx.lineWidth = 5;
            ctx.strokeStyle = currentTheme.ring;
            ctx.stroke();
            
            // Elvish script hint
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(0, 0, this.radius - 2, 0, Math.PI * 2);
            ctx.lineWidth = 1;
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.setLineDash([2, 4]);
            ctx.stroke();
            
            ctx.restore();
        },
        
        update: function() {
            this.velocity += this.gravity;
            this.y += this.velocity;
            
            // Floor collision
            if (this.y + this.radius >= canvas.height) {
                this.y = canvas.height - this.radius;
                handleCollision();
            }
            // Ceiling collision
            if (this.y - this.radius <= 0) {
                this.y = this.radius;
                this.velocity = 0;
            }
        },
        
        flap: function() {
            this.velocity = this.jump;
            createParticles(this.x, this.y, 5, currentTheme.ringGlow);
            sfx.flap();
        }
    };

    const pipes = {
        items: [], width: 60, gap: 150, dx: 2.5,
        
        draw: function() {
            for (let i = 0; i < this.items.length; i++) {
                let p = this.items[i];
                ctx.fillStyle = currentTheme.pipe;
                ctx.strokeStyle = currentTheme.pipeOutline;
                ctx.lineWidth = 2;

                // Top Pipe
                ctx.beginPath();
                ctx.rect(p.x, 0, this.width, p.top);
                ctx.fill(); ctx.stroke();
                
                // Top Spikes
                ctx.beginPath();
                ctx.moveTo(p.x, p.top); ctx.lineTo(p.x + 15, p.top + 20); ctx.lineTo(p.x + 30, p.top);
                ctx.lineTo(p.x + 45, p.top + 20); ctx.lineTo(p.x + 60, p.top);
                ctx.fill(); ctx.stroke();

                // Bottom Pipe
                ctx.beginPath();
                ctx.rect(p.x, canvas.height - p.bottom, this.width, p.bottom);
                ctx.fill(); ctx.stroke();

                // Bottom Spikes
                ctx.beginPath();
                ctx.moveTo(p.x, canvas.height - p.bottom); ctx.lineTo(p.x + 15, canvas.height - p.bottom - 20);
                ctx.lineTo(p.x + 30, canvas.height - p.bottom); ctx.lineTo(p.x + 45, canvas.height - p.bottom - 20);
                ctx.lineTo(p.x + 60, canvas.height - p.bottom);
                ctx.fill(); ctx.stroke();

                // Eye of Sauron / Sun
                if (i % 2 === 0) {
                    ctx.save();
                    ctx.translate(p.x + this.width/2, p.top + this.gap/2);
                    let scale = 1 + Math.sin(frames * 0.1) * 0.1;
                    ctx.scale(scale, scale);
                    ctx.beginPath(); ctx.ellipse(0, 0, 15, 25, 0, 0, Math.PI*2);
                    ctx.fillStyle = currentTheme.eye; ctx.fill();
                    if(currentTheme !== themes.shire) {
                        ctx.beginPath(); ctx.ellipse(0, 0, 3, 18, 0, 0, Math.PI*2);
                        ctx.fillStyle = '#000'; ctx.fill();
                    }
                    ctx.shadowBlur = 20; ctx.shadowColor = currentTheme.eye; ctx.stroke();
                    ctx.restore();
                }
            }
        },
        
        update: function() {
            if (frames % 100 === 0) {
                let minTop = 50;
                let maxTop = canvas.height - this.gap - 50;
                let topHeight = Math.floor(Math.random() * (maxTop - minTop + 1) + minTop);
                this.items.push({ x: canvas.width, top: topHeight, bottom: canvas.height - (topHeight + this.gap), passed: false });
            }
            
            for (let i = 0; i < this.items.length; i++) {
                let p = this.items[i];
                p.x -= this.dx;
                
                // Collision Detection
                let colR = ring.radius - 4;
                if (ring.x + colR > p.x && ring.x - colR < p.x + this.width) {
                    if (ring.y - colR < p.top || ring.y + colR > canvas.height - p.bottom) {
                        handleCollision();
                        if (ring.hasShield) {
                            // If shield broke, temporarily shift pipe away to prevent multi-hit
                            p.x -= 20; 
                        }
                    }
                }
                
                // Score Update
                if (p.x + this.width < ring.x && !p.passed) {
                    score++;
                    scoreDisplay.innerText = score;
                    p.passed = true;
                    sfx.score();
                    checkMilestone();
                    if(score % 10 === 0) this.dx += 0.2; // Speed up
                }
                
                if (p.x + this.width < 0) { this.items.shift(); i--; }
            }
        },
        reset: function() { this.items = []; this.dx = 2.5; }
    };

    // Collectibles (Lembas Bread) and Enemies (Nazgul)
    const entities = {
        items: [],
        draw: function() {
            for (let e of this.items) {
                ctx.save();
                ctx.translate(e.x, e.y);
                if (e.type === 'lembas') {
                    // Draw diamond
                    ctx.rotate(frames * 0.05);
                    ctx.fillStyle = currentTheme.powerup;
                    ctx.shadowBlur = 10; ctx.shadowColor = currentTheme.powerup;
                    ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(10, 0); ctx.lineTo(0, 10); ctx.lineTo(-10, 0); ctx.fill();
                } else if (e.type === 'nazgul') {
                    // Draw flying beast
                    ctx.fillStyle = currentTheme.enemy;
                    ctx.beginPath();
                    ctx.moveTo(15, 0);
                    ctx.lineTo(-10, -10 - Math.sin(frames*0.2)*5); // Wing flap
                    ctx.lineTo(-5, 0);
                    ctx.lineTo(-10, 10 + Math.sin(frames*0.2)*5); // Wing flap
                    ctx.fill();
                }
                ctx.restore();
            }
        },
        update: function() {
            // Spawn Lembas
            if (frames % 300 === 0 && Math.random() > 0.5) {
                this.items.push({ type: 'lembas', x: canvas.width + 100, y: Math.random() * (canvas.height - 200) + 100, width: 20, height: 20 });
            }
            // Spawn Nazgul (after score 5)
            if (score >= 5 && frames % 220 === 0) {
                this.items.push({ type: 'nazgul', x: canvas.width + 50, y: Math.random() * (canvas.height - 150) + 50, width: 25, height: 20, baseY: 0 });
                this.items[this.items.length-1].baseY = this.items[this.items.length-1].y;
            }

            for (let i = 0; i < this.items.length; i++) {
                let e = this.items[i];
                e.x -= pipes.dx * (e.type === 'nazgul' ? 1.5 : 1);
                
                if (e.type === 'nazgul') {
                    e.y = e.baseY + Math.sin(frames * 0.05) * 30; // Wavy motion
                }

                // Collision
                let dx = e.x - ring.x; let dy = e.y - ring.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                
                if (distance < ring.radius + 10) {
                    if (e.type === 'lembas') {
                        ring.hasShield = true;
                        sfx.powerup();
                        createParticles(ring.x, ring.y, 20, currentTheme.powerup);
                        this.items.splice(i, 1); i--;
                    } else if (e.type === 'nazgul') {
                        handleCollision();
                        if (!ring.hasShield) this.items.splice(i, 1); i--;
                    }
                } else if (e.x < -50) {
                    this.items.splice(i, 1); i--;
                }
            }
        },
        reset: function() { this.items = []; }
    };

    // Particles System
    const particles = {
        items: [],
        draw: function() {
            for(let p of this.items) {
                ctx.globalAlpha = p.life / p.maxLife;
                ctx.fillStyle = p.color || currentTheme.ringGlow;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha = 1.0;
        },
        update: function() {
            for(let i=0; i<this.items.length; i++) {
                let p = this.items[i];
                p.x -= pipes.dx; 
                p.y += p.vy;
                p.life--;
                if(p.life <= 0) { this.items.splice(i, 1); i--; }
            }
        },
        reset: function() { this.items = []; }
    };

    function createParticles(x, y, count, color) {
        for(let i=0; i<count; i++) {
            particles.items.push({
                x: x, y: y, vy: (Math.random() - 0.5) * 4,
                size: Math.random() * 3 + 1, life: 30, maxLife: 30, color: color
            });
        }
    }

    // Parallax Background Mountains
    const background = {
        x: 0,
        draw: function() {
            ctx.fillStyle = currentTheme.mountain;
            ctx.beginPath(); ctx.moveTo(this.x, canvas.height);
            for(let i=0; i<=10; i++) ctx.lineTo(this.x + i * 80, canvas.height - 100 - Math.abs(Math.sin(i * 1.5)) * 150);
            for(let i=0; i<=10; i++) ctx.lineTo(this.x + 800 + i * 80, canvas.height - 100 - Math.abs(Math.sin(i * 1.5)) * 150);
            ctx.lineTo(this.x + 1600, canvas.height); ctx.fill();
        },
        update: function() {
            this.x -= pipes.dx * 0.3;
            if(this.x <= -800) this.x = 0;
        }
    };

    // Collision Logic (handles Shield)
    function handleCollision() {
        if (ring.hasShield) {
            ring.hasShield = false;
            sfx.shieldBreak();
            createParticles(ring.x, ring.y, 30, currentTheme.shield);
            ring.velocity = -4; // Bounce off
            triggerScreenShake();
        } else {
            gameOver();
        }
    }

    // Milestones
    const quotes = {
        10: "Fly, you fools!",
        20: "My Precious!",
        30: "One does not simply...",
        40: "You bow to no one.",
        50: "A day of wolves & shattered shields!"
    };

    function checkMilestone() {
        if (quotes[score]) {
            milestoneMessage = quotes[score];
            milestoneTimer = 100; // Frames to display
        }
    }

    function drawMilestone() {
        if (milestoneTimer > 0) {
            ctx.save();
            ctx.fillStyle = `rgba(255, 215, 0, ${milestoneTimer / 100})`;
            ctx.font = "bold 20px Courier New";
            ctx.textAlign = "center";
            ctx.shadowBlur = 5;
            ctx.shadowColor = "#000";
            ctx.fillText(milestoneMessage, canvas.width / 2, 100);
            ctx.restore();
            milestoneTimer--;
        }
    }

    function triggerScreenShake() {
        gameWrapper.classList.remove('shake');
        void gameWrapper.offsetWidth; // Trigger reflow
        gameWrapper.classList.add('shake');
    }

    // Game Flow Functions
    function startGame() {
        initAudio(); // Required to unlock Web Audio API on click
        ring.y = 300; ring.velocity = 0; ring.hasShield = false;
        pipes.reset(); entities.reset(); particles.reset();
        score = 0; frames = 0; milestoneTimer = 0;
        scoreDisplay.innerText = score;
        currentState = 'PLAY';
        
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        scoreDisplay.style.display = 'block';
        
        cancelAnimationFrame(animationId);
        gameLoop();
    }

    function gameOver() {
        currentState = 'OVER';
        sfx.crash();
        triggerScreenShake();
        
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('flappyRingHighScore', highScore);
        }
        finalScoreEl.innerText = score;
        highScoreEl.innerText = highScore;
        
        createParticles(ring.x, ring.y, 50, currentTheme.ring);
        
        setTimeout(() => {
            gameOverScreen.classList.remove('hidden');
            scoreDisplay.style.display = 'none';
        }, 600);
    }

    function gameLoop() {
        ctx.fillStyle = currentTheme.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        background.draw();
        
        if (currentState === 'PLAY') {
            background.update();
            pipes.update();
            entities.update();
            ring.update();
            if(frames % 5 === 0) createParticles(ring.x, ring.y, 1, currentTheme.ringGlow);
            particles.update();
        }
        
        pipes.draw();
        entities.draw();
        particles.draw();
        drawMilestone();
        
        if (currentState !== 'OVER' || frames % 20 < 10) { 
            ring.draw();
        }

        frames++;
        
        if (currentState === 'PLAY' || currentState === 'OVER') {
            animationId = requestAnimationFrame(gameLoop);
        }
    }

    function setTheme(themeName, btnElement) {
        currentTheme = themes[themeName];
        gameWrapper.style.backgroundColor = currentTheme.bg;
        document.documentElement.style.setProperty('--bg-color', currentTheme.bg);
        document.documentElement.style.setProperty('--primary', currentTheme.ring);
        
        document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        
        if (currentState === 'START') {
            ctx.fillStyle = currentTheme.bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
            background.draw(); ring.draw();
        }
    }

    function handleInput(e) {
        if(e.type === 'keydown' && (e.code !== 'ArrowUp' && e.code !== 'Space')) return;
        if(e.type === 'keydown') e.preventDefault();

        if (currentState === 'START') {
            startGame();
        } else if (currentState === 'PLAY') {
            ring.flap();
        } else if (currentState === 'OVER' && !gameOverScreen.classList.contains('hidden')) {
            startGame();
        }
    }

    window.addEventListener('keydown', handleInput);
    window.addEventListener('mousedown', (e) => { if(e.target.tagName !== 'BUTTON') handleInput(e); });
    window.addEventListener('touchstart', (e) => { if(e.target.tagName !== 'BUTTON') handleInput(e); }, {passive: false});

    highScoreEl.innerText = highScore;
    ctx.fillStyle = currentTheme.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    background.draw(); ring.draw();
</script>
