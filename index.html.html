<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Ring: Extended Edition (with Autopilot)</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #FFFFFF;
            --primary: #FFD700;
            --ui-bg: rgba(0, 0, 0, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: var(--text-color);
        }

        #game-wrapper {
            position: relative;
            width: 400px;
            height: 600px;
            max-width: 100vw;
            max-height: 100vh;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            background-color: var(--bg-color);
            overflow: hidden;
        }

        /* Screen shake animation for game over */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .shake {
            animation: shake 0.4s;
            animation-iteration-count: 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--ui-bg);
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 2rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--primary);
            margin-bottom: 10px;
            text-align: center;
        }

        p {
            font-size: 1rem;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.5;
        }

        .score-display {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary);
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            z-index: 5;
            pointer-events: none;
        }

        .controls-hint {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 20px;
        }

        .btn {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 10px 20px;
            font-size: 1.2rem;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            margin-bottom: 15px;
        }

        .btn:hover {
            background: var(--primary);
            color: var(--bg-color);
        }

        .theme-selector, .toggles {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .theme-btn, .toggle-btn {
            background: transparent;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            padding: 5px 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        
        .theme-btn.active, .toggle-btn.active {
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 5px var(--primary);
        }

        /* Scanline effect for high contrast vibe */
        #game-wrapper::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 20;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="scoreDisplay" class="score-display">0</div>
    
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    
    <div id="startScreen" class="ui-layer">
        <h1>Flappy Ring</h1>
        <p>Cast it into the fire!<br>Destroy it!</p>
        <button class="btn" onclick="startGame()">Start Journey</button>
        <p class="controls-hint">Press UP ARROW, SPACE, or TAP to jump</p>
        
        <div class="theme-selector">
            <button class="theme-btn active" onclick="setTheme('highContrast', this)">High Contrast</button>
            <button class="theme-btn" onclick="setTheme('mordor', this)">Mordor</button>
            <button class="theme-btn" onclick="setTheme('shire', this)">The Shire</button>
        </div>
        <div class="toggles">
            <button class="toggle-btn active" id="soundToggle" onclick="toggleSound()">Sound: ON</button>
            <button class="toggle-btn" id="autoToggle" onclick="toggleAutopilot()">Autopilot: OFF</button>
        </div>
    </div>

    <div id="gameOverScreen" class="ui-layer hidden">
        <h1>The Ring is Lost</h1>
        <p>Score: <span id="finalScore">0</span><br>High Score: <span id="highScore">0</span></p>
        <button class="btn" onclick="startGame()">Try Again</button>
        <p class="controls-hint">Press UP ARROW to restart</p>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const finalScoreEl = document.getElementById('finalScore');
    const highScoreEl = document.getElementById('highScore');
    const gameWrapper = document.getElementById('game-wrapper');
    const soundToggle = document.getElementById('soundToggle');
    const autoToggle = document.getElementById('autoToggle');

    // Themes
    const themes = {
        highContrast: {
            bg: '#000000', ring: '#FFD700', ringGlow: '#FFFFFF',
            pipe: '#FFFFFF', pipeOutline: '#000000', mountain: '#333333',
            eye: '#FF0000', enemy: '#FF0000', powerup: '#00FF00', shield: '#00FFFF'
        },
        mordor: {
            bg: '#2A0800', ring: '#FFB300', ringGlow: '#FF4500',
            pipe: '#0D0D0D', pipeOutline: '#FF4500', mountain: '#1A0500',
            eye: '#FFEB3B', enemy: '#000000', powerup: '#00FF00', shield: '#4169E1'
        },
        shire: {
            bg: '#87CEEB', ring: '#FFD700', ringGlow: '#FFA500',
            pipe: '#228B22', pipeOutline: '#006400', mountain: '#90EE90',
            eye: '#FFFFFF', enemy: '#3333
